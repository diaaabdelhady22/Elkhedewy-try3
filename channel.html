<script>

/* فتح القائمة */

let ss = document.querySelector(".ss");

let openBtn = document.getElementById("kk");

let closeBtn = document.getElementById("closeSS");

openBtn.onclick = function () {

    ss.style.opacity = "1";

    ss.style.visibility = "visible";

    ss.style.right = "0";

};

/* قفل القائمة */

closeBtn.onclick = function () {

    ss.style.opacity = "0";

    ss.style.visibility = "hidden";

    ss.style.right = "-1000px";

};

/* فتح الإعدادات */

document.getElementById("openSettings").onclick = function(){

    document.getElementById("mainPage").style.display = "none";

    document.getElementById("settingsPage").style.display = "block";

};

/* رجوع */

document.getElementById("backBtn").onclick = function(){

    document.getElementById("settingsPage").style.display = "none";

    document.getElementById("mainPage").style.display = "block";

};

/* الوضع الليلي */

document.getElementById("darkMode").onchange = function(){

    if(this.checked){

        document.body.style.background = "white";

        document.body.style.color = "black";

    }else{

        document.body.style.background = "#030303";

        document.body.style.color = "white";

    }

};

/* إيقاف الأنيميشن */

document.getElementById("animationToggle").onchange = function(){

    let all = document.querySelectorAll("*");

    if(this.checked){

        all.forEach(function(el){

            el.style.animationPlayState = "running";

        });

    }else{

        all.forEach(function(el){

            el.style.animationPlayState = "paused";

        });

    }

};

/* particles */

document.getElementById("particlesToggle").onchange = function(){

    let particles = document.querySelector(".particles");

    if(this.checked){

        particles.style.display = "none";

    }else{

        particles.style.display = "block";

    }

};

/* تكبير الخط */

document.getElementById("fontToggle").onchange = function(){

    if(this.checked){

        document.body.style.zoom = "110%";

    }else{

        document.body.style.zoom = "100%";

    }

};

/* الأصوات */

document.getElementById("soundToggle").onchange = function(){

    let media = document.querySelectorAll("audio,video");

    media.forEach(function(item){

        item.muted = !item.muted;

    });

};

/* الإشعارات */

document.getElementById("notificationToggle").onchange = function(){

    if(this.checked){

        alert("تم تشغيل الإشعارات");

    }else{

        alert("تم إيقاف الإشعارات");

    }

};

</script>
